name: Environament Example
on: [push]

# ------------
# WORKFLOW LEVEL ENV
# ------------
env:
  APP_NAME: my-app
  GLOBAL_TIMEOUT: 30
  OWNER: "Shankar DevOps"

jobs:
  demo:
    runs-on: ubuntu-latest

    # ------------
    # JOB LEVEL ENV
    # ------------
    env:
      JOB_ENV: "job-level-value"
      REGION: "ap-south-1"

    steps:
      - name: Show workflow-level + job_level env
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "GLOBAL_TIMEOUT: $GLOBAL_TIMEOUT"
          echo "OWNER: $OWNER"
          echo "JOB_ENV: $JOB_ENV"
          echo "REGION: $REGION"

      # ------------
      # STEP-LEVEL ENV
      # ------------
      - name: Step with custom environment variables
        env:
          APP_NAME: "my-app-step"
          STEP_VAR2: "world"
        run: |
          echo "APP_NAME: $APP_NAME"
          echo "STEP_VAR2: $STEP_VAR2"

      # ------------
      # Referencing Github default variables
      # ------------
      - name: Using Github context
        run: |
          echo "REPO: ${{ github.repository }}"
          echo "BRANCH: ${{ github.ref_name }}"
          echo "COMMIT: ${{ github.sha }}"